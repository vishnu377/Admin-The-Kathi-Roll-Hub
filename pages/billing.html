<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/admin.css"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);font-family:'Inter',sans-serif;height:100svh;display:flex;align-items:center;justify-content:center;padding:20px}
    .wrap{text-align:center;max-width:420px}
    .icon{font-size:64px;margin-bottom:20px}
    h1{font-size:20px;font-weight:800;color:var(--txt);margin-bottom:10px}
    p{font-size:14px;color:var(--txt2);line-height:1.6;margin-bottom:28px}
    .btn-big{
      background:var(--yellow);color:#000;border:none;border-radius:var(--r-lg);
      font-family:'Inter',sans-serif;font-size:16px;font-weight:800;
      padding:16px 32px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;
      box-shadow:var(--shadow-md);
    }
    .hint{margin-top:18px;font-size:12px;color:var(--txt3)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">⚡</div>
    <h1>Fast Billing yahan se hota hai!</h1>
    <p>Top bar ka <strong>⚡ Counter</strong> button kahin se bhi kaam karta hai — customer ka mobile number daalo, offer select karo, bill amount likho, aur 3 click mein bill ready!</p>
    <button class="btn-big" onclick="window.parent.openCounter()">⚡ Counter Kholo</button>
    <div class="hint">Yeh button top bar mein hamesha available hai — yahan tak aane ki zarurat nahi padegi.</div>
  </div>
</body>
</html>
